version: 2
updates:
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 04:00
    timezone: Europe/Madrid
  open-pull-requests-limit: 1
  labels:
  - dependencies
  - npm
  commit-message:
    prefix: build(deps)
    include: scope
  groups:
    all-others:
      patterns:
      - '*'
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
  open-pull-requests-limit: 1
  labels:
  - dependencies
  - github-actions
  commit-message:
    prefix: build(ci)
    include: scope
  groups:
    all-others:
      patterns:
      - '*'
